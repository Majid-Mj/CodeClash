name: Build and deploy ASP.Net Core app to Azure Web App - codeclash

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # ✅ KEY FIX: point to the CodeClash subfolder
      - name: Build with dotnet
        run: dotnet build --configuration Release
        working-directory: ./CodeClash

      # ✅ KEY FIX: publish from the subfolder
      - name: dotnet publish
        run: dotnet publish -c Release -o ./publish
        working-directory: ./CodeClash

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          # ✅ KEY FIX: upload from CodeClash/publish
          path: ./CodeClash/publish

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'codeclash'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
